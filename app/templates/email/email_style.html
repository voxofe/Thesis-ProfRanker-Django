<!doctype html>
<html lang="el">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{subject}</title>
  </head>
  <body style="margin:0;padding:0;background:#f4f2ec;font-family:Arial,Helvetica,sans-serif;color:#2b2b2b;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#fbf8f1;padding:26px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="width:600px;max-width:600px;background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(99,52,57,0.12);">
            <tr>
              <td style="padding:18px 24px;background:#633439;color:#ffffff;">
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                  <tr>
                    <td style="width:88px;vertical-align:middle;">
                      <img src="{logo_url}" alt="ProfRanker" width="72" style="display:block;border:0;" />
                    </td>
                    <td style="vertical-align:middle;">
                      <div style="font-size:13px;letter-spacing:0.5px;text-transform:uppercase;color:#f2e0c6;">
                        Πανεπιστήμιο Πατρών
                      </div>
                      <div style="font-size:16px;font-weight:600;line-height:1.4;color:#ffffff;">
                        Αίτηση υποψηφιότητας διδασκόντων
                      </div>
                      <div style="font-size:12px;line-height:1.4;color:#f2e0c6;">
                        Πρόσκληση απόκτησης διδακτικής-ακαδημαϊκής εμπειρίας για νέους επιστήμονες
                      </div>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:28px;">
                <h1 style="margin:0 0 12px 0;font-size:16px;line-height:1.3;color:#2a191b;">{headline}</h1>
                <div style="font-size:15px;line-height:1.6;color:#2b2b2b;">{body_html}</div>
              </td>
            </tr>
            <tr>
              <td style="padding:18px 28px;background:#f2e0c6;color:#6b4b3f;font-size:12px;line-height:1.5;">
                {footer_text}
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
